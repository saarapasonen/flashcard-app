{% extends "base.html" %}
{% block title %}Edit Card — Flashcards{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Edit Card in {{ project['name'] }}</h1>
    <form method="post">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label for="front">Front</label>
        <textarea id="front" name="front" rows="3"
                  required>{{ card['front'] }}</textarea>
        <label for="back">Back</label>
        <textarea id="back" name="back" rows="3"
                  required>{{ card['back'] }}</textarea>
        <label for="difficulty">Difficulty</label>
        <select id="difficulty" name="difficulty">
            <option value="easy"
                {% if card['difficulty'] == 'easy' %}selected{% endif %}>
                Easy</option>
            <option value="medium"
                {% if card['difficulty'] == 'medium' %}selected{% endif %}>
                Medium</option>
            <option value="hard"
                {% if card['difficulty'] == 'hard' %}selected{% endif %}>
                Hard</option>
        </select>
        <button type="submit">Save</button>
    </form>
</div>
{% endblock %}
